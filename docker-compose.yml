version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: transcribemd-postgres
    environment:
      POSTGRES_DB: transcribemd
      POSTGRES_USER: transcribemd
      POSTGRES_PASSWORD: transcribemd123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U transcribemd"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: transcribemd-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: transcribemd-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin123 &&
        mc mb --ignore-existing local/transcribemd &&
        mc anonymous set download local/transcribemd/public &&
        echo 'MinIO initialized'
      "

  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: transcribemd-ml
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./ml-service:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: transcribemd-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/transcribemd
      SPRING_DATASOURCE_USERNAME: transcribemd
      SPRING_DATASOURCE_PASSWORD: transcribemd123
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      ML_SERVICE_URL: http://ml-service:8000
      SPRING_AI_ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      ml-service:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
