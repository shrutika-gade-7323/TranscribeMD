spring:
  application:
    name: transcribemd-backend

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:transcribemd;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: ${DB_DIALECT:org.hibernate.dialect.H2Dialect}

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  h2:
    console:
      enabled: true
      path: /h2-console

  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

  security:
    user:
      name: admin
      password: admin123

  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:your-api-key-here}
    gemini:
      api-key: ${GEMINI_API_KEY:your-api-key-here}
    llm:
      provider: ${LLM_PROVIDER:gemini}


server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

transcribemd:
  storage:
    type: ${STORAGE_TYPE:local}
    local:
      base-path: ${LOCAL_STORAGE_PATH:./uploads}
    minio:
      endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
      access-key: ${MINIO_ACCESS_KEY:minioadmin}
      secret-key: ${MINIO_SECRET_KEY:minioadmin123}
      bucket: transcribemd

  ml-service:
    url: ${ML_SERVICE_URL:http://localhost:8000}
    timeout-seconds: 300

  processing:
    annotation-prompt-template: classpath:prompts/annotation.txt

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

logging:
  level:
    com.transcribemd: DEBUG
    org.springframework.ai: INFO
    org.apache.poi: WARN

---
spring:
  config:
    activate:
      on-profile: postgres
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/transcribemd}
    username: ${SPRING_DATASOURCE_USERNAME:transcribemd}
    password: ${SPRING_DATASOURCE_PASSWORD:transcribemd123}
    driver-class-name: org.postgresql.Driver
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    locations: classpath:db/migration/postgresql
